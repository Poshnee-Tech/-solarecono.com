<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Navy rounded background -->
  <rect width="64" height="64" rx="14" fill="#1A3F7A"/>
  <!-- Solar panel frame -->
  <rect x="9" y="22" width="46" height="26" rx="4" fill="none" stroke="#F5A623" strokeWidth="3"/>
  <!-- Panel grid lines -->
  <line x1="9" y1="35" x2="55" y2="35" stroke="#F5A623" strokeWidth="2"/>
  <line x1="32" y1="22" x2="32" y2="48" stroke="#F5A623" strokeWidth="2"/>
  <!-- Sun rays above panel -->
  <line x1="32" y1="6" x2="32" y2="16" stroke="#FCD34D" strokeWidth="3" strokeLinecap="round"/>
  <line x1="22" y1="9" x2="25" y2="15" stroke="#FCD34D" strokeWidth="2.5" strokeLinecap="round"/>
  <line x1="42" y1="9" x2="39" y2="15" stroke="#FCD34D" strokeWidth="2.5" strokeLinecap="round"/>
  <line x1="15" y1="14" x2="19" y2="18" stroke="#FCD34D" strokeWidth="2" strokeLinecap="round"/>
  <line x1="49" y1="14" x2="45" y2="18" stroke="#FCD34D" strokeWidth="2" strokeLinecap="round"/>
</svg>
